allowBuilds:
  '@clerk/shared': true
  esbuild: true
  msw: false
  sharp: true
  unrs-resolver: true
overrides:
  # drizzle-kit still drags the deprecated @esbuild-kit chain (pins old esbuild);
  # remove once drizzle-kit drops @esbuild-kit/esm-loader.
  esbuild@<0.24.3: 0.25.12
  # next pins postcss exactly (8.4.31), even on latest; remove when next ships >=8.5.10.
  postcss@<8.5.10: ^8.5.10
